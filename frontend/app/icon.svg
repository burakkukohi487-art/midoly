<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf70;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a3f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4f5e2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a4a28" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 背景円 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 3本の収束ライン（左上・右上・下から中心ピンへ） -->
  <line x1="108" y1="148" x2="228" y2="232" stroke="white" stroke-width="14" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="404" y1="148" x2="284" y2="232" stroke="white" stroke-width="14" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="256" y1="420" x2="256" y2="298" stroke="white" stroke-width="14" stroke-linecap="round" stroke-opacity="0.45"/>

  <!-- 出発点の小丸 -->
  <circle cx="108" cy="148" r="18" fill="white" opacity="0.6"/>
  <circle cx="404" cy="148" r="18" fill="white" opacity="0.6"/>
  <circle cx="256" cy="420" r="18" fill="white" opacity="0.6"/>

  <!-- 中心マップピン -->
  <g filter="url(#shadow)">
    <path d="M256 168 C220 168 192 196 192 232 C192 278 256 330 256 330 C256 330 320 278 320 232 C320 196 292 168 256 168 Z"
          fill="url(#pinGrad)"/>
    <circle cx="256" cy="228" r="22" fill="#3a7d44"/>
  </g>

  <!-- 出発点の人 -->
  <circle cx="108" cy="130" r="10" fill="white" opacity="0.6"/>
  <circle cx="404" cy="130" r="10" fill="white" opacity="0.6"/>
  <circle cx="256" cy="438" r="10" fill="white" opacity="0.6"/>
</svg>
